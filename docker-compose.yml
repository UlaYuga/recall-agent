services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./storage:/app/storage

  dashboard:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard:/app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

  landing:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3000"
    volumes:
      - ./landing:/app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

